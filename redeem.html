<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redeem · Reeflux Beta</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=VT323&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <audio id="reefAudio" loop preload="auto">
    <source src="/assets/reeflux.mp3" type="audio/mpeg" />
  </audio>

  <div class="container">
    <header class="topbar">
      <div class="brand">
        <span class="brand__logo">Reeflux</span>
        <span class="brand__beta">Beta</span>
      </div>
      <div class="centerTitle">
        <h1>Redeem</h1>
        <p>Access acknowledged.</p>
      </div>
      <button class="audioBtn" id="audioToggle" aria-label="Toggle ambient audio" aria-pressed="false">Play Audio</button>
    </header>

    <section class="panel panel--padded">
      <h2>Access acknowledged.</h2>
      <p>Choose your next pool.</p>
      <div class="pillRow">
        <a class="pillLink" href="/tide-deck">Tide Deck</a>
        <span class="pillLink" aria-disabled="true">Mirror Pool — inbound.</span>
        <a class="pillLink" href="/requests">Requests Terminal</a>
      </div>
    </section>

    <footer class="panel footer">
      <div>Reeflux Beta · Redeem</div>
      <nav>
        <a href="/">Home</a>
        <a href="/token-booth">Token Booth</a>
        <a href="/rules">Rules</a>
      </nav>
    </footer>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="/app.js" defer></script>
</body>
</html>
