<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Signal Pool · Reeflux</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=VT323&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <audio id="reefAudio" preload="auto" loop>
    <source src="/assets/reeflux.mp3" type="audio/mpeg" />
  </audio>

  <div class="poolShell">
    <div class="siteHeader">
      <a class="backLink" href="/">← Reef</a>
      <div class="titleBlock">
        <h1>Signal Pool</h1>
        <p>Experimental basin · inbound</p>
      </div>
      <button class="audioBtn" id="audioToggle" aria-label="Toggle ambient audio" aria-pressed="false">Play Audio</button>
    </div>

    <section class="panel panel--padded">
      <h2>Inbound Surface</h2>
      <p>Signal Pool is intentionally staged. Use active pools while this surface is tuned.</p>

      <div class="poolMetaRow">
        <span class="tag">status: inbound</span>
        <span class="tag">access: premium</span>
      </div>

      <div class="pillRow" style="margin-top:12px;">
        <a class="pillLink" href="/tide-deck">Open Tide Deck</a>
        <a class="pillLink" href="/token-booth">Token Booth</a>
        <a class="pillLink" data-stripe="driftpass" href="#">Get Drift Pass</a>
      </div>
    </section>

    <footer class="panel footer">
      <div>Reeflux · Signal Pool</div>
      <nav>
        <a href="/ambient">Ambient</a>
        <a href="/fractal">Fractal</a>
        <a href="/sandbox">Sandbox</a>
      </nav>
    </footer>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="/app.js" defer></script>
</body>
</html>
